---
name: CI
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3', '3.4', '4.0']
        browser: ['chrome', 'firefox']
        gemfile: ['Gemfile', 'gemfiles/low_spec.gemfile']
        exclude:
          # Cucumber v8.x cannot run ruby 3.4+ - this was fixed in cucumber v9.2.1
          # Revisit these exclusions once low spec cucumber is < 10
          - { ruby: '3.4', gemfile: 'gemfiles/low_spec.gemfile' }
          - { ruby: '4.0', gemfile: 'gemfiles/low_spec.gemfile' }
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      BROWSER: ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: '2.6.9'
          bundler-cache: true
      - run: bundle exec rspec
      - run: bundle exec cucumber --publish-quiet
      - run: bundle exec rubocop
